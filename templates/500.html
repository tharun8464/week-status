{% extends 'base.html' %}

{% block title %}Server Error - Weekly Status Report Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="error-page py-5">
            <i class="fas fa-exclamation-triangle fa-5x text-danger mb-4"></i>
            <h1 class="display-4 mb-3">500</h1>
            <h2 class="mb-4">Server Error</h2>
            <p class="lead mb-4">Sorry, something went wrong on our servers. We're working to fix the issue.</p>
            <div class="mt-5">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i> Return to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
