{% extends 'base.html' %}

{% block title %}Page Not Found - Weekly Status Report Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">
        <div class="error-page py-5">
            <i class="fas fa-map-signs fa-5x text-warning mb-4"></i>
            <h1 class="display-4 mb-3">404</h1>
            <h2 class="mb-4">Page Not Found</h2>
            <p class="lead mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            <div class="mt-5">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i> Return to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
